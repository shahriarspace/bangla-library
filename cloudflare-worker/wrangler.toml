name = "bangla-library-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "READS_KV"
id = "your-kv-namespace-id"       # Replace with actual KV namespace ID from Cloudflare dashboard

[triggers]
crons = ["*/10 * * * *"]          # every 10 minutes

[vars]
GITHUB_REPO = "shahriarspace/bangla-library"

# Secrets — set via CLI, never commit to git:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put BOT_GITHUB_TOKEN
