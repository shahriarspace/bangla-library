name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site + search index
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-search-engines:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow (Bing, Yandex, DuckDuckGo)
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "shahriarspace.github.io",
              "key": "bangla-library-indexnow",
              "keyLocation": "https://shahriarspace.github.io/bangla-library/bangla-library-indexnow.txt",
              "urlList": [
                "https://shahriarspace.github.io/bangla-library/",
                "https://shahriarspace.github.io/bangla-library/books/",
                "https://shahriarspace.github.io/bangla-library/authors/",
                "https://shahriarspace.github.io/bangla-library/about/",
                "https://shahriarspace.github.io/bangla-library/request/",
                "https://shahriarspace.github.io/bangla-library/stats/",
                "https://shahriarspace.github.io/bangla-library/privacy/",
                "https://shahriarspace.github.io/bangla-library/books/bishad-sindhu/",
                "https://shahriarspace.github.io/bangla-library/books/gitanjali/",
                "https://shahriarspace.github.io/bangla-library/books/moyurakkhi/",
                "https://shahriarspace.github.io/bangla-library/books/kichukkhan/",
                "https://shahriarspace.github.io/bangla-library/authors/rabindranath-tagore/",
                "https://shahriarspace.github.io/bangla-library/authors/mir-mosharraf-hossain/",
                "https://shahriarspace.github.io/bangla-library/authors/humayun-ahmed/"
              ]
            }' || true
          echo "IndexNow pinged successfully"
